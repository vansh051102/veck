name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch makes an in-flight run obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Types in prisma/schema.prisma are generated, not committed — every
      # later step needs the client to exist before it can typecheck.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npx next lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx jest --ci

      # DATABASE_URL is only needed so `next build` can collect page data; it is
      # never connected to. A syntactically valid dummy keeps the build honest
      # without putting a real credential in CI.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/veck
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-key
